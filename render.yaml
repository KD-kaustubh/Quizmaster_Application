services:
  - type: web
    name: quizmaster
    env: python
    plan: free
    pythonVersion: "3.12.10"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    
    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app.py
      - key: FLASK_DEBUG
        value: 0
      - key: AUTO_SEED_DEMO_DATA
        value: true
      - key: WTF_CSRF_ENABLED
        value: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SESSION_COOKIE_HTTPONLY
        value: true
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
